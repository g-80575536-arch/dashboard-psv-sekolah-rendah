<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Stop Dashboard PSV Cerdik - Poster Interaktif</title>
    <style>
        /* ==========================================
           1. GAYA UMUM & TEMA
           ========================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial', sans-serif; }
        body { background-color: #f0f9ff; color: #333; padding: 20px; }
        header { text-align: center; padding: 30px; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); border-radius: 20px; margin-bottom: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        header h1 { color: #fff; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); margin-bottom: 10px; }
        header p { color: #fff; font-size: 1.2rem; font-weight: bold; }

        /* ==========================================
           2. MENU UTAMA UTK AKTIVITI
           ========================================== */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto 30px auto; }
        .menu-card { background-color: white; border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.05); transition: transform 0.2s; border: 4px solid transparent; }
        .menu-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.15); }
        .icon { font-size: 3.5rem; }
        .card-nota { border-color: #ff6b6b; background-color: #fff5f5; h3, .icon { color: #ff6b6b; } }
        .card-video { border-color: #4dadf7; background-color: #e7f5ff; h3, .icon { color: #4dadf7; } }
        .card-kuiz { border-color: #fcc419; background-color: #fff9db; h3, .icon { color: #fcc419; } }

        /* ==========================================
           3. PANEL TAPISAN TAHUN & KANDUNGAN
           ========================================== */
        .content-section { max-width: 1200px; margin: 0 auto 30px auto; background-color: white; border-radius: 20px; padding: 30px; box-shadow: 0 6px 12px rgba(0,0,0,0.05); display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-tutup { background-color: #e0e0e0; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; float: right; }
        .filter-panel { background-color: #f8f9fa; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid #e9ecef; }
        .filter-title { font-weight: bold; margin-bottom: 10px; color: #495057; }
        .flex-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; align-items: center; }
        
        .btn-opt { background-color: #fff; border: 2px solid #ced4da; padding: 8px 18px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.2s; }
        .active-tahun { background-color: #495057 !important; color: white !important; }
        .active-tajuk { background-color: #228be6 !important; color: white !important; border-color: #228be6 !important; }
        .btn-buku-teks { background-color: #e64980; color: white; text-decoration: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* Lencana Warna Mengikut Bidang */
        .badge-bidang { display: inline-block; padding: 3px 8px; font-size: 0.75rem; font-weight: bold; border-radius: 5px; margin-left: 5px; color: white; vertical-align: middle; }
        .badge-menggambar { background-color: #ff6b6b; }
        .badge-corak { background-color: #4dadf7; }
        .badge-membentuk { background-color: #51cf66; }
        .badge-kraf { background-color: #fcc419; color: #333; }

        /* ==========================================
           4. OUTPUT PANEL MULTIMEDIA
           ========================================== */
        .output-container { margin-top: 25px; }
        .nota-box { background-color: #fdfdfd; padding: 25px; border-radius: 15px; border: 1px solid #eee; border-left: 6px solid #ff6b6b; margin-bottom: 20px; }
        .nota-box h4 { color: #ff6b6b; margin-bottom: 10px; font-size: 1.4rem; }
        .nota-box ul { padding-left: 20px; margin-bottom: 20px; line-height: 1.6; }
        
        /* Gaya Bekas Poster (Gaya Kursor Bertukar Tangan) */
        .media-preview-container { width: 100%; max-width: 650px; margin-top: 15px; border-radius: 10px; overflow: hidden; border: 2px dashed #ff6b6b; transition: transform 0.2s, box-shadow 0.2s; }
        .media-preview-container:hover { transform: scale(1.01); box-shadow: 0 6px 12px rgba(255,107,107,0.15); }
        .media-preview-container img { width: 100%; height: auto; display: block; cursor: pointer; }
        
        .slide-download-card { background: #fff3f3; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; margin-top: 15px; border: 1px solid #ffcccc; max-width: 650px; }

        .video-box { background-color: #f8f9fa; border-radius: 15px; padding: 20px; border: 1px solid #e9ecef; max-width: 750px; }
        .video-box h4 { color: #4dadf7; margin-bottom: 8px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; background: #000; margin-top: 12px; }
        .video-wrapper video, .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* Kuiz Card */
        .soalan-card { background: #fff; border: 2px solid #fcc419; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .option-lbl { display: block; background: #f8f9fa; padding: 12px; margin-top: 8px; border-radius: 8px; cursor: pointer; border: 1px solid #e9ecef; }
        .option-lbl:hover { background-color: #fff9db; }
        .option-lbl input { margin-right: 10px; transform: scale(1.2); }
        .btn-semak { background-color: #fcc419; color: #333; border: none; padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; max-width: 400px; margin-top: 10px; }
        #output-keputusan { margin-top: 25px; padding: 25px; border-radius: 15px; text-align: center; font-size: 1.4rem; font-weight: bold; display: none; max-width: 650px; box-shadow: 0 6px 12px rgba(0,0,0,0.05); }
        .pesan-kosong { color: #868e96; font-style: italic; padding: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>🎨 One-Stop Dashboard PSV Cerdik</h1>
        <p>Susunan Struktur Berasaskan Unit Buku Teks & Label Bidang KSSR</p>
    </header>

    <main class="menu-grid">
        <div class="menu-card card-nota" onclick="paparModul('nota')"><div class="icon">📚</div><h3>Nota Digital & Slaid</h3></div>
        <div class="menu-card card-video" onclick="paparModul('video')"><div class="icon">🎥</div><h3>Video Tutorial</h3></div>
        <div class="menu-card card-kuiz" onclick="paparModul('kuiz')"><div class="icon">🧩</div><h3>Uji Minda Kuiz</h3></div>
    </main>

    <section id="modul-container" class="content-section">
        <button class="btn-tutup" onclick="tutupModul()">Tutup X</button>
        <h2 id="nama-modul-aktif">Nama Modul</h2>
        
        <div class="filter-panel">
            <div class="filter-title">Langkah 1: Pilih Peringkat Tahun:</div>
            <div class="flex-bar">
                <button class="btn-opt btn-thn" onclick="pilihTahun(1, this)">Tahun 1</button>
                <button class="btn-opt btn-thn" onclick="pilihTahun(2, this)">Tahun 2</button>
                <button class="btn-opt btn-thn" onclick="pilihTahun(3, this)">Tahun 3</button>
                <button class="btn-opt btn-thn" onclick="pilihTahun(4, this)">Tahun 4</button>
                <button class="btn-opt btn-thn" onclick="pilihTahun(5, this)">Tahun 5</button>
                <button class="btn-opt btn-thn" onclick="pilihTahun(6, this)">Tahun 6</button>
                <a id="akses-buku-teks" href="#" target="_blank" class="btn-buku-teks">📖 Buka Buku Teks</a>
            </div>

            <div class="filter-title" id="judul-tapis-tajuk" style="display:none;">Langkah 2: Pilih Unit / Tajuk Buku Teks:</div>
            <div class="flex-bar" id="bar-tajuk"></div>
        </div>

        <div id="output-kandungan-induk" class="output-container"></div>
    </section>

    <script>
        const petaBukuTeks = {
            1: "D1 BT PKES - PENDIDIKAN KESENIAN SK INDEKS.pdf",
            2: "D2 BT PKES - PENDIDIKAN KESENIAN INDEKS.pdf",
            3: "D3 BT PSENI - PENDIDIKAN KESENIAN index.pdf",
            4: "D4 BT PSENI - PENDIDIKAN KESENIAN TAHUN 4 SK - 14 OKT 2019 (1).pdf",
            5: "D5 BT PSV - PENDIDIKAN SENI VISUAL SK.pdf",
            6: "D6 BT PSV - PENDIDIKAN SENI VISUAL SK.pdf"
        };

        const senaraiTajukBukuTeks = {
            1: [
                { idTajuk: "t1_u1", namaTajuk: "Unit 1: Seni Bermula Di Sini", bidang: "Menggambar", krafBadge: "badge-menggambar" },
                { idTajuk: "t1_u2", namaTajuk: "Unit 2: Ikatan dan Celupan", bidang: "Corak & Rekaan", krafBadge: "badge-corak" }
            ],
            2: [
                { idTajuk: "t2_u1", namaTajuk: "Unit 1: Catan Basah Atas Basah", bidang: "Menggambar", krafBadge: "badge-menggambar" },
                { idTajuk: "t2_tembikar", namaTajuk: "Unit 4: Uli-Uli Tembikar", bidang: "Kraf Tradisional", krafBadge: "badge-kraf" }
            ],
            3: [
                { idTajuk: "t3_u1", namaTajuk: "Unit 1: Projek Kolaj Ceria", bidang: "Menggambar", krafBadge: "badge-menggambar" }
            ],
            4: [
                { idTajuk: "t4_u1", namaTajuk: "Unit 1: Gurisan Indah", bidang: "Menggambar", krafBadge: "badge-menggambar" }
            ],
            5: [
                { idTajuk: "t5_u1", namaTajuk: "Unit 1: Poster Keselamatan", bidang: "Menggambar", krafBadge: "badge-menggambar" }
            ],
            6: [
                { idTajuk: "t6_u1", namaTajuk: "Unit 1: Perspektif 2 Titik Lenyap", bidang: "Menggambar", krafBadge: "badge-menggambar" }
            ]
        };

        const pangkalanDataMaster = {
            "t1_u1": {
                nota: { tajuk: "Unit 1: Seni Bermula Di Sini (Tahun 1)", isi: ["Pengenalan alat krayon dan pensel warna.","Melukis rupa geometri dan rupa organik asas."] },
                video: { tajuk: "Video: Asas Garisan & Lukisan Tahun 1", utubeId: "dQw4w9WgXcQ", deskripsi: "Panduan memegang krayon." },
                kuiz: [{ soalan: "Apakah contoh warna asas?", pilihan: ["A. Hijau", "B. Merah", "C. Ungu"], jawapan: "B" }]
            },
            
            // UNIT UTAMA DEMONSTRASI (POSTER BIAR BOLEH DIKLIK)
            "t2_tembikar": {
                nota: {
                    tajuk: "Unit 4: Mengenal Kraf Tradisional - Uli-Uli Tembikar",
                    isi: [
                        "<strong>Teknik Utama:</strong> Picitan jari tangan secara konsisten pada tanah liat atau plastisin.",
                        "<strong>Alatan Tambahan:</strong> Batang lidi kayu pencungkil bulat atau sudu untuk menghasilkan ragam hias.",
                        "<strong>Fokus Estetika:</strong> Membina bentuk 3D pasu/mangkuk yang seimbang (Imbangan Simetri) dan menghasilkan jalinan sentuh yang menarik."
                    ],
                    paparImej: "poster infografik uli-uli tembikar.png", 
                    failSlaid: "Uli-Uli-Tembikar-Mengenal-Kraf-Tangan-Tradisional.pptx" 
                },
                video: {
                    tajuk: "Video Panduan Projek: Uli-Uli Tembikar Tahun 2",
                    failVideo: "Tembikar_Warisan_Malaysia.mp4", 
                    deskripsi: "Tonton langkah menguli tanah liat untuk membuang angin, melakukan teknik picitan berpusat, dan menghias permukaan luaran tembikar."
                },
                kuiz: [
                    { soalan: "Apakah teknik paling asas yang digunakan dalam topik Uli-Uli Tembikar untuk membentuk tanah liat?", pilihan: ["A. Teknik Binaan Jalur", "B. Teknik Picitan Jari", "C. Teknik Acuan"], jawapan: "B" },
                    { soalan: "Apakah fungsi menyapu sedikit air pada permukaan tanah liat semasa membentuk?", pilihan: ["A. Menukarkan warna", "B. Melicinkan permukaan dan mengelakkan rekahan", "C. Mempercepatkan tanah keras"], jawapan: "B" },
                    { soalan: "Apakah unsur seni utama yang terhasil apabila lidi ditekan pada permukaan tembikar?", pilihan: ["A. Jalinan", "B. Imbangan", "C. Rupa Geometri"], jawapan: "A" },
                    { soalan: "Tembikar dikategorikan sebagai bentuk karya jenis apa?", pilihan: ["A. 2 Dimensi (2D)", "B. 3 Dimensi (3D)", "C. Seni Digital"], jawapan: "B" },
                    { soalan: "Apakah nama produk kraf tembikar tradisional Melayu yang berbentuk seperti buah labu?", pilihan: ["A. Pasu Seramik", "B. Labu Sayong", "C. Tempayan Gergasi"], jawapan: "B" },
                    { soalan: "Alatan manakah yang paling selamat untuk membuat corak ragam hias pada plastisin di kelas?", pilihan: ["A. Pisau dapur", "B. Batang lidi atau pencungkil bulat", "C. Gunting besi"], jawapan: "B" },
                    { soalan: "Mengapakah kita perlu menguli tanah liat dengan sekata sebelum mula membentuk?", pilihan: ["A. Menjadikan tanah beku", "B. Mengeluarkan gelembung udara agar struktur tidak mudah pecah", "C. Menukar warna tanah"], jawapan: "B" },
                    { soalan: "Apakah bahan di bilik darjah yang paling sesuai menggantikan tanah liat asli?", pilihan: ["A. Pasir pantai", "B. Plastisin", "C. Serbuk kapur"], jawapan: "B" },
                    { soalan: "Prinsip rekaan imbangan simetri bermaksud bentuk bahagian kiri dan kanan tembikar adalah...", pilihan: ["A. Berbeza bentuk", "B. Sama rata atau seimbang", "C. Senget"], jawapan: "B" },
                    { soalan: "Apakah langkah akhir selepas selesai membentuk model tembikar?", pilihan: ["A. Memotong menggunakan pisau", "B. Mengeringkannya di tempat teduh", "C. Merendam ke dalam besen air"], jawapan: "B" }
                ]
            }
        };

        let modulAktif = '', penapisTahun = null, penapisTajukId = null;

        function paparModul(modul) {
            modulAktif = modul;
            document.getElementById('nama-modul-aktif').innerText = { 'nota': '📚 Nota Digital & Slaid', 'video': '🎥 Video Tutorial', 'kuiz': '🧩 Uji Minda 10 Soalan Kuiz' }[modul];
            document.getElementById('modul-container').style.display = 'block';
            resetSistem();
            document.getElementById('modul-container').scrollIntoView({ behavior: 'smooth' });
        }

        function resetSistem() {
            penapisTahun = null; penapisTajukId = null;
            document.querySelectorAll('.btn-thn').forEach(b => b.classList.remove('active-tahun'));
            document.getElementById('bar-tajuk').innerHTML = '';
            document.getElementById('judul-tapis-tajuk').style.display = 'none';
            document.getElementById('akses-buku-teks').style.display = 'none';
            document.getElementById('output-kandungan-induk').innerHTML = '';
        }

        function tutupModul() { document.getElementById('modul-container').style.display = 'none'; }
        function bersihkanOutput() { document.getElementById('output-kandungan-induk').innerHTML = ''; }

        function pilihTahun(tahun, elemen) {
            penapisTahun = depth = tahun;
            penapisTajukId = null;
            bersihkanOutput();
            
            document.querySelectorAll('.btn-thn').forEach(b => b.classList.remove('active-tahun'));
            elemen.classList.add('active-tahun');

            const btnBuku = document.getElementById('akses-buku-teks');
            if (modulAktif === 'nota' && petaBukuTeks[tahun]) { 
                btnBuku.href = petaBukuTeks[tahun]; 
                btnBuku.style.display = 'inline-block'; 
                btnBuku.innerText = `📖 Buku Teks T${tahun}`;
            } else { 
                btnBuku.style.display = 'none'; 
            }

            const barTajuk = document.getElementById('bar-tajuk');
            document.getElementById('judul-tapis-tajuk').style.display = 'block';
            barTajuk.innerHTML = '';

            const senaraiTajuk = senaraiTajukBukuTeks[tahun];
            if (!senaraiTajuk || senaraiTajuk.length === 0) {
                barTajuk.innerHTML = '<span class="pesan-kosong">ℹ️ Indeks unit buku teks tahun ini sedia ditambah.</span>';
                return;
            }

            senaraiTajuk.forEach(t => {
                barTajuk.innerHTML += `
                    <button class="btn-opt btn-tjk" onclick="setPenapisTajuk('${t.idTajuk}', this)">
                        ${t.namaTajuk} <span class="badge-bidang ${t.krafBadge}">${t.bidang}</span>
                    </button>`;
            });
        }

        function setPenapisTajuk(idTajuk, elemen) {
            penapisTajukId = idTajuk;
            document.querySelectorAll('.btn-tjk').forEach(b => b.classList.remove('active-tajuk'));
            elemen.classList.add('active-tajuk');
            
            paparDataMultimediaTuntas();
        }

        function paparDataMultimediaTuntas() {
            const outputArea = document.getElementById('output-kandungan-induk');
            outputArea.innerHTML = '';

            const dataTajuk = pangkalanDataMaster[penapisTajukId];
            if (!dataTajuk || !dataTajuk[modulAktif]) {
                outputArea.innerHTML = '<div class="pesan-kosong">ℹ️ Kandungan multimedia khusus untuk unit/modul ini sedia dimasukkan mengikut folder fail anda.</div>';
                return;
            }

            if (modulAktif === 'nota') {
                const n = dataTajuk.nota;
                let html = `
                    <div class="nota-box">
                        <h4>${n.tajuk}</h4>
                        <ul>${n.isi.map(i => `<li>${i}</li>`).join('')}</ul>`;
                
                // DIKEMASKINI: Poster Infografik kini boleh diklik menggunakan tag <a>
                if (n.paparImej) {
                    html += `
                        <div class="media-preview-container">
                            <p style="padding:10px; background:#f1f3f5; font-weight:bold; color:#ff6b6b;">🖼️ Poster Infografik (Klik gambar untuk besarkan):</p>
                            <a href="${n.paparImej}" target="_blank" title="Klik untuk lihat imej penuh">
                                <img src="${n.paparImej}" alt="Klik untuk besarkan poster infografik">
                            </a>
                        </div>`;
                }
                if (n.failSlaid) {
                    html += `
                        <div class="slide-download-card">
                            <div><strong>📁 Slaid Pengajaran Sekolah</strong><br><small>${n.failSlaid}</small></div>
                            <a href="${n.failSlaid}" style="background:#ff6b6b; color:white; padding:8px 15px; border-radius:5px; text-decoration:none; font-weight:bold;">Muat Turun</a>
                        </div>`;
                }
                html += `</div>`;
                outputArea.innerHTML = html;
            } 
            else if (modulAktif === 'video') {
                const v = dataTajuk.video;
                let formatVideo = '';
                
                if (v.failVideo) {
                    formatVideo = `<video src="${v.failVideo}" controls controlsList="nodownload"></video>`;
                } else {
                    formatVideo = `<iframe src="https://www.youtube.com/embed/${v.utubeId}" allowfullscreen></iframe>`;
                }

                outputArea.innerHTML = `
                    <div class="video-box">
                        <h4>${v.tajuk}</h4>
                        <p style="margin-top: 5px; color:#666;">${v.deskripsi}</p>
                        <div class="video-wrapper">
                            ${formatVideo}
                        </div>
                    </div>`;
            } 
            else if (modulAktif === 'kuiz') {
                const k = dataTajuk.kuiz;
                let qHtml = `<div style="max-width:850px;">`;
                
                k.forEach((item, idx) => {
                    qHtml += `
                        <div class="soalan-card" data-jwb="${item.jawapan}">
                            <p style="font-weight:bold; margin-bottom:8px;">Soalan ${idx+1}: ${item.soalan}</p>
                            ${item.pilihan.map(p => `<label class="option-lbl"><input type="radio" name="rad_${idx}" value="${p.charAt(0)}"> ${p}</label>`).join('')}
                        </div>`;
                });
                qHtml += `<button class="btn-semak" onclick="kiraMarkahKuizTajuk(${k.length})">Semak Keputusan Kuiz</button><div id="output-keputusan"></div></div>`;
                outputArea.innerHTML = qHtml;
            }
        }

        function kiraMarkahKuizTajuk(total) {
            let betul = 0, lengkap = true;
            const kadSoalan = document.querySelectorAll('.soalan-card');
            for (let i = 0; i < total; i++) {
                const ditanda = document.querySelector(`input[name="rad_${i}"]:checked`);
                if (!ditanda) { lengkap = false; break; }
                if (ditanda.value === kadSoalan[i].dataset.jwb) betul++;
            }
            if (!lengkap) { alert("Sila pastikan anda menjawab kesemua 10 soalan kuiz terlebih dahulu! 😊"); return; }
            
            const peratus = Math.round((betul / total) * 100);
            const panelRes = document.getElementById('output-keputusan');
            panelRes.style.display = 'block';
            
            if (peratus >= 80) {
                panelRes.style.background = '#d3f9d8'; panelRes.style.color = '#2b8a3e';
                panelRes.innerHTML = `🌟 SKOR CEMERLANG! 🌟<br>Betul: ${betul}/${total} Soalan (${peratus}%)<br><small style="font-weight:normal;">Tahniah! Anda telah menguasai unit pengajaran buku teks ini dengan sangat hebat!</small>`;
            } else if (peratus >= 50) {
                panelRes.style.background = '#fff9db'; panelRes.style.color = '#f08c00';
                panelRes.innerHTML = `👍 KEPUTUSAN BAIK 👍<br>Betul: ${betul}/${total} Soalan (${peratus}%)<br><small style="font-weight:normal;">Usaha yang baik! Cuba klik semula poster infografik di atas untuk mengulangkaji skor penuh.</small>`;
            } else {
                panelRes.style.background = '#fff5f5'; panelRes.style.color = '#c92a2a';
                panelRes.innerHTML = `📚 MARI CUBA LAGI 📚<br>Betul: ${betul}/${total} Soalan (${peratus}%)<br><small style="font-weight:normal;">Jangan putus asa, mari muat turun semula slaid pengajaran di atas dan jawab semula kuiz ya.</small>`;
            }
            panelRes.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
